# git-cliff config — used by .github/workflows/release.yml to generate
# changelog entries from conventional commits between tags.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
Format follows [Conventional Commits](https://www.conventionalcommits.org/).

"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\\n") | first | trim | upper_first }} \
  ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat",      group = "Features" },
  { message = "^fix",       group = "Bug fixes" },
  { message = "^docs",      group = "Documentation" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactors" },
  { message = "^test",      group = "Tests" },
  { message = "^chore",     group = "Chores" },
  { message = "^ci",        group = "CI/CD" },
  { message = "^build",     group = "Build system" },
  { body = ".*security",    group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
