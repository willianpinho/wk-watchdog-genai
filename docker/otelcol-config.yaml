# OpenTelemetry Collector config for the wk-watchdog dev stack.
#
# Pipeline:
#   watchdog-api  --(OTLP HTTP)-->  otelcol  --(OTLP gRPC)-->  jaeger
#                                          \--(prometheusexporter)--> prometheus
#
# Receivers/exporters are intentionally minimal. A production deployment
# would add a tail-sampling processor and remote-write to a managed
# backend, but for the demo the simplest pipeline that wires everything
# together is what's useful.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 128

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, debug]
