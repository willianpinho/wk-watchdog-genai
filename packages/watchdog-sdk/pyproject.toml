[project]
name = "watchdog-sdk"
version = "0.1.0"
description = "wk-watchdog Python client SDK (Turn 12 — placeholder)"
readme = "../../README.md"
requires-python = ">=3.12"
authors = [{ name = "Willian Pinho", email = "willianpinho@gmail.com" }]
license = { text = "MIT" }
dependencies = [
  "watchdog-core",
  "httpx>=0.27",
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/watchdog_sdk"]
