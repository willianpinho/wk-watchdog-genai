[project]
name = "watchdog-core"
version = "0.1.0"
description = "wk-watchdog domain core (pure types, zero infrastructure)"
readme = "../../README.md"
requires-python = ">=3.12"
authors = [{ name = "Willian Pinho", email = "willianpinho@gmail.com" }]
license = { text = "MIT" }
dependencies = [
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/watchdog_core"]
