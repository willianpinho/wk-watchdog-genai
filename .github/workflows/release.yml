name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  UV_VERSION: "0.5.18"
  PYTHON_VERSION: "3.12"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs the full history for changelog

      # ----- changelog ------------------------------------------------
      - name: generate changelog (git-cliff)
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_LATEST.md

      # ----- container image (multi-arch, semver-tagged) -------------
      - uses: docker/setup-buildx-action@v3
      - name: ghcr.io login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker meta — semver tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/watchdog-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REV=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      # ----- watchdog-sdk wheel --------------------------------------
      # We do NOT publish to PyPI in this challenge; the wheel is
      # attached to the GitHub Release as an artefact. To publish to
      # PyPI later: `uv publish --repository-url https://upload.pypi.org/legacy/`
      # (use `--repository-url https://test.pypi.org/legacy/` for TestPyPI).
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: build SDK wheel
        run: |
          uv build packages/watchdog-sdk --out-dir dist-sdk

      # ----- GitHub Release ------------------------------------------
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What changed

            ${{ steps.changelog.outputs.content }}

            ## Container images

            - `ghcr.io/${{ github.repository_owner }}/watchdog-api:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/watchdog-api:${{ github.sha }}`

            ## SDK wheel

            Attached as a release artefact. Install with:

            ```
            pip install https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/watchdog_sdk-${{ github.ref_name }}-py3-none-any.whl
            ```

            (When we publish to PyPI: `pip install watchdog-sdk==${{ github.ref_name }}`.)
          files: |
            dist-sdk/*.whl
            dist-sdk/*.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: false
